name: 🤖 Automated Model Retraining

on:
  workflow_dispatch:  # Allows you to run it manually from the "Actions" tab
  schedule:
    - cron: '0 0 1 * *'  # Runs at midnight on the 1st of every month

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib pyarrow fastparquet

      - name: 🚂 Run Training Pipeline
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python scripts/train_and_export.py

      - name: 📊 Check Metrics
        run: |
          cat models/metadata.json

      - name: 📤 Commit and Push New Model
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add models/model.joblib models/scaler.joblib models/metadata.json
          git commit -m "🤖 auto: update trained model artifacts [skip ci]" || echo "No changes to commit"
          git push
